<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fire</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .fire {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    height: 60vh;
    pointer-events: none;
    /* keep the effect contained so the browser can skip work offscreen */
    contain: strict;
    /* soft fade where flames meet the dark sky */
    -webkit-mask-image: linear-gradient(to top, #000 35%, transparent 100%);
            mask-image: linear-gradient(to top, #000 35%, transparent 100%);
  }

  /* warm glow hugging the ground - cheap, single layer */
  .fire::before {
    content: "";
    position: absolute;
    inset: auto 0 -10% 0;
    height: 70%;
    background:
      radial-gradient(ellipse 60% 100% at 50% 100%, rgba(255,140,40,.55), rgba(255,60,0,.25) 40%, transparent 70%),
      radial-gradient(ellipse 100% 80% at 50% 100%, rgba(255,80,0,.35), transparent 70%);
    filter: blur(6px);
  }

  /* the flames themselves: small number of GPU-only animated blobs.
     Each .flame is a radial-gradient ellipse that rises, scales and fades. */
  .flame {
    position: absolute;
    bottom: -10%;
    width: 18vmin;
    height: 28vmin;
    border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%;
    background: radial-gradient(
      ellipse at 50% 80%,
      rgba(255,240,180,.95) 0%,
      rgba(255,170,40,.85) 18%,
      rgba(255,90,0,.75) 38%,
      rgba(200,30,0,.45) 60%,
      rgba(120,0,0,0) 80%
    );
    mix-blend-mode: screen;
    transform: translate3d(0,0,0) scale(.6);
    will-change: transform, opacity;
    animation: rise 3.4s ease-in infinite;
    opacity: 0;
  }

  @keyframes rise {
    0%   { transform: translate3d(0, 10%, 0) scale(.55) skewX(0deg);   opacity: 0; }
    15%  { opacity: .9; }
    50%  { transform: translate3d(2%, -55%, 0) scale(1)  skewX(4deg); }
    100% { transform: translate3d(-2%, -120%, 0) scale(.35) skewX(-6deg); opacity: 0; }
  }

  /* flames spread across the width with varying delay/duration/size */
  .flame:nth-child(1)  { left:  2%; animation-duration: 3.2s; animation-delay: -0.1s; width: 16vmin; height: 26vmin; }
  .flame:nth-child(2)  { left:  9%; animation-duration: 3.8s; animation-delay: -0.9s; width: 22vmin; height: 32vmin; }
  .flame:nth-child(3)  { left: 16%; animation-duration: 3.0s; animation-delay: -1.7s; width: 14vmin; height: 24vmin; }
  .flame:nth-child(4)  { left: 23%; animation-duration: 3.6s; animation-delay: -2.3s; width: 24vmin; height: 36vmin; }
  .flame:nth-child(5)  { left: 30%; animation-duration: 3.4s; animation-delay: -0.6s; width: 18vmin; height: 28vmin; }
  .flame:nth-child(6)  { left: 37%; animation-duration: 3.1s; animation-delay: -1.4s; width: 20vmin; height: 30vmin; }
  .flame:nth-child(7)  { left: 44%; animation-duration: 3.9s; animation-delay: -2.6s; width: 26vmin; height: 38vmin; }
  .flame:nth-child(8)  { left: 50%; animation-duration: 3.2s; animation-delay: -0.5s; width: 28vmin; height: 40vmin; }
  .flame:nth-child(9)  { left: 56%; animation-duration: 3.7s; animation-delay: -1.9s; width: 22vmin; height: 32vmin; }
  .flame:nth-child(10) { left: 63%; animation-duration: 3.3s; animation-delay: -2.4s; width: 18vmin; height: 28vmin; }
  .flame:nth-child(11) { left: 70%; animation-duration: 3.5s; animation-delay: -0.8s; width: 24vmin; height: 34vmin; }
  .flame:nth-child(12) { left: 77%; animation-duration: 3.0s; animation-delay: -1.5s; width: 16vmin; height: 26vmin; }
  .flame:nth-child(13) { left: 84%; animation-duration: 3.8s; animation-delay: -2.2s; width: 22vmin; height: 32vmin; }
  .flame:nth-child(14) { left: 91%; animation-duration: 3.3s; animation-delay: -0.3s; width: 18vmin; height: 28vmin; }
  .flame:nth-child(15) { left: 97%; animation-duration: 3.6s; animation-delay: -1.1s; width: 14vmin; height: 22vmin; }

  /* a few small ember sparks - just transforms + opacity */
  .ember {
    position: absolute;
    bottom: 0;
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: #ffd089;
    box-shadow: 0 0 6px 1px rgba(255,180,80,.9);
    opacity: 0;
    will-change: transform, opacity;
    animation: spark 4s linear infinite;
  }
  .ember:nth-child(16) { left:  8%; animation-delay: -0.4s; --dx:  3vw; }
  .ember:nth-child(17) { left: 15%; animation-delay: -1.6s; --dx: -2vw; animation-duration: 4.6s; }
  .ember:nth-child(18) { left: 22%; animation-delay: -2.8s; --dx:  5vw; animation-duration: 3.8s; }
  .ember:nth-child(19) { left: 30%; animation-delay: -3.5s; --dx: -4vw; }
  .ember:nth-child(20) { left: 38%; animation-delay: -1.1s; --dx:  2vw; animation-duration: 5.2s; }
  .ember:nth-child(21) { left: 46%; animation-delay: -2.3s; --dx: -6vw; }
  .ember:nth-child(22) { left: 54%; animation-delay: -0.7s; --dx:  4vw; animation-duration: 4.2s; }
  .ember:nth-child(23) { left: 62%; animation-delay: -2.9s; --dx: -3vw; }
  .ember:nth-child(24) { left: 70%; animation-delay: -1.4s; --dx:  6vw; animation-duration: 4.8s; }
  .ember:nth-child(25) { left: 78%; animation-delay: -3.1s; --dx: -5vw; }
  .ember:nth-child(26) { left: 86%; animation-delay: -0.9s; --dx:  2vw; animation-duration: 3.6s; }
  .ember:nth-child(27) { left: 93%; animation-delay: -2.5s; --dx: -4vw; }

  @keyframes spark {
    0%   { transform: translate3d(0, 0, 0) scale(1);   opacity: 0; }
    10%  { opacity: 1; }
    100% { transform: translate3d(var(--dx, 4vw), -90vh, 0) scale(.2); opacity: 0; }
  }

  /* respect users who prefer no motion, and disable on very small/old devices via media query */
  @media (prefers-reduced-motion: reduce) {
    .flame, .ember { animation: none; opacity: .6; }
  }
</style>
</head>
<body>
  <div class="fire" aria-hidden="true">
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="flame"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
    <div class="ember"></div>
  </div>
</body>
</html>
