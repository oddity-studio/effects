<title>Embers</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    /* near-black with a subtle dotted texture so bubble "holes" reveal
       a faintly patterned dark surface instead of a flat black void. */
    background-color: #050505;
    background-image:
      radial-gradient(rgba(255,255,255,.035) 1px, transparent 1.2px),
      radial-gradient(rgba(255,255,255,.02)  1px, transparent 1.2px);
    background-size: 6px 6px, 11px 11px;
    background-position: 0 0, 3px 4px;
  }

  .stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
    contain: strict;
    /* screen-blend the whole effect onto the patterned body. fire colors
       brighten the texture; the black bubble holes screen to identity, so
       the body's dot pattern shows cleanly through them. */
    mix-blend-mode: screen;
    isolation: isolate;
  }

  /* gradient lives on its own layer so we can scale it on the GPU
     instead of repainting the stage background every frame. */
  .fire-bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      #ffffff 0%,
      #fff2a8 3%,
      #ffb22a 7%,
      #c43000 20%,
      #a10000 24%,
      #000000 33%
    );
    transform-origin: 50% 100%;
    will-change: transform;
    animation: bob 4.6s linear infinite;
  }

  /* dense, irregular stops + non-prime spacing to look chaotic. +/- 20%. */
  @keyframes bob {
    0%   { transform: scaleY(1.00); }
    4%   { transform: scaleY(1.14); }
    9%   { transform: scaleY(.87); }
    13%  { transform: scaleY(1.18); }
    19%  { transform: scaleY(.83); }
    24%  { transform: scaleY(1.05); }
    29%  { transform: scaleY(.91); }
    33%  { transform: scaleY(1.19); }
    38%  { transform: scaleY(.84); }
    43%  { transform: scaleY(1.12); }
    48%  { transform: scaleY(.88); }
    53%  { transform: scaleY(1.17); }
    58%  { transform: scaleY(.82); }
    63%  { transform: scaleY(1.07); }
    68%  { transform: scaleY(.93); }
    73%  { transform: scaleY(1.16); }
    78%  { transform: scaleY(.85); }
    83%  { transform: scaleY(1.10); }
    88%  { transform: scaleY(.89); }
    93%  { transform: scaleY(1.13); }
    97%  { transform: scaleY(.86); }
    100% { transform: scaleY(1.00); }
  }

  /* one blur pass on the whole layer is much cheaper than blurring each
     of the 225 particles individually. */
  .bubbles {
    position: absolute;
    inset: 0;
    filter: blur(6px);
    will-change: filter;
  }

  .bubble {
    position: absolute;
    bottom: -10vh;
    left: var(--x, 50%);
    width: var(--size, 10px);
    height: var(--size, 10px);
    margin-left: calc(var(--size, 10px) / -2);
    border-radius: 50%;
    background: #000;
    will-change: transform;
    animation: rise calc(var(--dur, 4s) / 2.4) linear infinite;
    animation-delay: var(--delay, 0s);
  }

  /* start tiny (almost invisible), grow as they rise. transform-only. */
  /* zig-zag horizontally while rising. each bubble's --dx flips sign and
     magnitude through the keyframes so trajectories aren't straight lines.
     scale grows monotonically from .05 to 12. */
  @keyframes rise {
    0%   { transform: translate3d(0, 0, 0) scale(.2); }
    14%  { transform: translate3d(calc(var(--dx, 0vw) *  .20), -7vh,  0) scale(1.5); }
    28%  { transform: translate3d(calc(var(--dx, 0vw) * -.25), -14vh, 0) scale(3.0); }
    42%  { transform: translate3d(calc(var(--dx, 0vw) *  .30), -21vh, 0) scale(4.8); }
    57%  { transform: translate3d(calc(var(--dx, 0vw) * -.35), -29vh, 0) scale(6.8); }
    72%  { transform: translate3d(calc(var(--dx, 0vw) *  .40), -36vh, 0) scale(8.8); }
    87%  { transform: translate3d(calc(var(--dx, 0vw) * -.45), -43vh, 0) scale(10.6); }
    100% { transform: translate3d(calc(var(--dx, 0vw) *  .50), -50vh, 0) scale(12); }
  }

  @media (prefers-reduced-motion: reduce) {
    .bubble { animation: none; visibility: hidden; }
  }
</style>
