<!doctype html>
<html lang="en">

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Embers</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
    contain: strict;
  }

  /* one static gradient layer multiplies onto the white particles, tinting
     them by vertical position: white -> yellow -> red -> black (= invisible).
     this means each particle only animates `transform`, never paints. */
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(
      to top,
      #ffffff 0%,
      #fff2a8 14%,
      #ffb22a 28%,
      #c43000 46%,
      #3a0000 60%,
      #000000 72%
    );
    mix-blend-mode: multiply;
  }

  .bubble {
    position: absolute;
    bottom: -2vh;
    left: var(--x, 50%);
    width: var(--size, 10px);
    height: var(--size, 10px);
    margin-left: calc(var(--size, 10px) / -2);
    border-radius: 50%;
    background: #fff;
    will-change: transform;
    animation: rise var(--dur, 4s) linear infinite;
    animation-delay: var(--delay, 0s);
  }

  /* GPU-only: just transform. no color, no opacity, no paint per frame. */
  @keyframes rise {
    from { transform: translate3d(0, 0, 0) scale(3.45); }
    to   { transform: translate3d(var(--dx, 0vw), -75vh, 0) scale(.1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .bubble { animation: none; visibility: hidden; }
  }
</style>
</head>
