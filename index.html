<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Embers</title>
<style>
  :root { color-scheme: dark; }
  html, body {
    margin: 0;
    height: 100%;
    background: #000;
    overflow: hidden;
  }

  .stage {
    position: fixed;
    inset: 0;
    pointer-events: none;
    contain: strict;
  }

  .bubble {
    position: absolute;
    bottom: -2vh;
    left: var(--x, 50%);
    width: var(--size, 10px);
    height: var(--size, 10px);
    margin-left: calc(var(--size, 10px) / -2);
    border-radius: 50%;
    background: #fff;
    opacity: 0;
    will-change: transform, opacity, background-color, box-shadow;
    animation: rise var(--dur, 6s) linear infinite;
    animation-delay: var(--delay, 0s);
  }

  /* white-hot at the bottom, cools to yellow, then dark red, then gone.
     finishes around the second third of the screen (~66vh up). */
  @keyframes rise {
    0% {
      transform: translate3d(0, 0, 0) scale(1.15);
      background-color: #ffffff;
      box-shadow: 0 0 14px 5px rgba(255,255,230,.95);
      opacity: 0;
    }
    8% { opacity: 1; }
    25% {
      transform: translate3d(calc(var(--dx, 0vw) * .25), -16vh, 0) scale(1);
      background-color: #fff5b0;
      box-shadow: 0 0 12px 4px rgba(255,235,150,.9);
    }
    50% {
      transform: translate3d(calc(var(--dx, 0vw) * .55), -34vh, 0) scale(.6);
      background-color: #ffc23a;
      box-shadow: 0 0 9px 3px rgba(255,170,40,.8);
      opacity: .95;
    }
    78% {
      transform: translate3d(calc(var(--dx, 0vw) * .85), -54vh, 0) scale(.3);
      background-color: #8a1400;
      box-shadow: 0 0 5px 2px rgba(140,20,0,.6);
      opacity: .55;
    }
    100% {
      transform: translate3d(var(--dx, 0vw), -68vh, 0) scale(.08);
      background-color: #2a0000;
      box-shadow: 0 0 0 0 rgba(0,0,0,0);
      opacity: 0;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .bubble { animation: none; opacity: 0; }
  }
</style>
</head>
